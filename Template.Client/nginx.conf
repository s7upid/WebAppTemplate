server {
    listen 80;

    # Set up GZIP compression for faster loading
    gzip on;
    gzip_types text/plain application/javascript application/json text/css application/xml;

    # --- 1. Proxy API requests to the Backend Service ---
    # Any request starting with /api/ will be forwarded to the backend container.
    location /api/ {
        # The service name is 'backend' and the port is 5249 (as defined in docker-compose.yml)
        proxy_pass http://backend:5249;

        # Standard proxy headers for preserving host/client IP information
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Ensure all HTTP methods are passed through correctly
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Disable buffering to reduce latency
        proxy_buffering off;
        
        # Increase timeouts for longer requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # --- 2. Serve Frontend Static Assets ---
    # All other requests are treated as static files for the SPA (Single Page Application).
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        
        # Crucial for SPAs: try files first, then fall back to index.html 
        # so client-side routing works (e.g., /dashboard loads the index.html file)
        try_files $uri $uri/ /index.html;
    }
}
